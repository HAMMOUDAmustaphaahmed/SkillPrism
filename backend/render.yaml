services:
  - type: web
    name: skillprism-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: MAX_FILE_SIZE_MB
        value: "5"
